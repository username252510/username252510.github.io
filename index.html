<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>html test</title>
  <style>
    :root{--bg:#000;--fg:#fff}
    html,body{height:100%;margin:0}
    body{
      background:var(--bg);
      color:var(--fg);
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:20px;
      font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
      padding:24px;
      box-sizing:border-box;
    }
    .container{max-width:1100px;width:100%;text-align:center}
    
    /* Updated image styling to keep Krava Gubby compact and fully visible */
    img{
      max-width:400px;
      width:100%;
      height:auto;
      border-radius:8px;
      box-shadow:0 8px 24px rgba(255,255,255,0.03);
    }
    
    /* Styles for the text section */
    .text-content{
      max-width:600px;
      margin:24px auto;
      line-height:1.6;
      font-size:16px;
      opacity:0.9;
    }
    .text-content a{
      color:#2f9e2f; /* A clean accent color for your guide link */
      text-decoration:none;
      font-weight:500;
    }
    .text-content a:hover{
      text-decoration:underline;
    }

    .github-link{
      display:inline-block;
      text-decoration:none;
      color:var(--fg);
      border:1px solid rgba(255,255,255,0.12);
      padding:10px 14px;
      border-radius:8px;
      font-weight:600;
    }
    .github-link:focus,.github-link:hover{opacity:0.85}
    footer{font-size:13px;opacity:0.7}
    @media (max-width:420px){img{max-width:100%}}
  </style>
</head>
<body>
  <main class="container">
    <img src="images/KravaGubby.PNG" alt="Main image">

    <div class="text-content">
      <p>There isnt really anything on the main page of my site rn, but Im going to add stuff eventually :)</p>
      <p>but I am currently making an iOS sideloading page at <a href="https://con.is-cool.dev/sideloading/" target="_blank" rel="noopener noreferrer">con.is-cool.dev/sideloading</a>.</p>
    </div>

    <p>
      <a class="github-link" href="https://github.com/username252510" target="_blank" rel="noopener noreferrer">Visit my GitHub</a>
    </p>

  </main>
</body>
</html>
